  <path d="M811 472H890" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 12"/>
  <text x="126" y="145" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700">1. Publish</text>
  <text x="126" y="184" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="24">Create a meta-address once.</text>
  <text x="126" y="218" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="24">Share a name, not a wallet.</text>
  <text x="528" y="145" fill="#523500" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700">2. Derive</text>
  <text x="528" y="184" fill="#523500" font-family="Helvetica, Arial, sans-serif" font-size="24">Sender uses ML-KEM to create</text>
  <text x="528" y="218" fill="#523500" font-family="Helvetica, Arial, sans-serif" font-size="24">a one-time destination.</text>
  <text x="923" y="145" fill="#17305B" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700">3. Send</text>
  <text x="923" y="184" fill="#17305B" font-family="Helvetica, Arial, sans-serif" font-size="24">Funds land at a fresh address</text>
  <text x="923" y="218" fill="#17305B" font-family="Helvetica, Arial, sans-serif" font-size="24">that looks unrelated.</text>
  <text x="126" y="427" fill="#652B17" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700">4. Announce</text>
  <text x="126" y="466" fill="#652B17" font-family="Helvetica, Arial, sans-serif" font-size="24">A public breadcrumb is posted.</text>
  <text x="126" y="500" fill="#652B17" font-family="Helvetica, Arial, sans-serif" font-size="24">Only the recipient can decode it.</text>
  <text x="528" y="427" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700">5. Scan</text>
  <text x="528" y="466" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="24">The recipient filters by view tag</text>
  <text x="528" y="500" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="24">and recovers the payment.</text>
  <text x="923" y="427" fill="#43246A" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700">6. Spend</text>
  <text x="923" y="466" fill="#43246A" font-family="Helvetica, Arial, sans-serif" font-size="24">Today this step stays wallet-</text>
  <text x="923" y="500" fill="#43246A" font-family="Helvetica, Arial, sans-serif" font-size="24">compatible through secp256k1.</text>
  <text x="94" y="642" fill="#0F766E" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">SPECTER user journey</text>
  <text x="292" y="642" fill="#4B5563" font-family="Helvetica, Arial, sans-serif" font-size="22">Private receiving first. Honest spend boundary second.</text>
</svg>
