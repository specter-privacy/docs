  <text x="156" y="198" fill="#7C2D12" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Alice</text>
  <text x="130" y="232" fill="#7C2D12" font-family="Helvetica, Arial, sans-serif" font-size="20">Wants a private</text>
  <text x="138" y="258" fill="#7C2D12" font-family="Helvetica, Arial, sans-serif" font-size="20">channel with Bob</text>
  <text x="450" y="198" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">SPECTER</text>
  <text x="448" y="232" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="20">Derive Bob's</text>
  <text x="438" y="258" fill="#0B3B36" font-family="Helvetica, Arial, sans-serif" font-size="20">stealth address</text>
  <text x="768" y="198" fill="#7C2D12" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Announcement</text>
  <text x="786" y="232" fill="#7C2D12" font-family="Helvetica, Arial, sans-serif" font-size="20">Bind</text>
  <text x="760" y="258" fill="#7C2D12" font-family="Helvetica, Arial, sans-serif" font-size="20">channel_id</text>
  <text x="956" y="428" fill="#1E3A8A" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Yellow</text>
  <text x="934" y="462" fill="#1E3A8A" font-family="Helvetica, Arial, sans-serif" font-size="20">Private channel</text>
  <text x="458" y="428" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Bob scans</text>
  <text x="448" y="462" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="20">Discovers the</text>
  <text x="452" y="488" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="20">linked channel</text>
  <text x="118" y="428" fill="#9D174D" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">Privacy win</text>
  <text x="104" y="462" fill="#9D174D" font-family="Helvetica, Arial, sans-serif" font-size="20">Relationship is less</text>
  <text x="112" y="488" fill="#9D174D" font-family="Helvetica, Arial, sans-serif" font-size="20">publicly obvious</text>
  <text x="54" y="676" fill="#5B21B6" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Yellow as a SPECTER use case</text>
  <text x="395" y="676" fill="#6B7280" font-family="Helvetica, Arial, sans-serif" font-size="22">Private receiving becomes private channel discovery.</text>
